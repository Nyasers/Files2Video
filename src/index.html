<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>F2V · Files to Video</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon-32.png" />
    <meta name="theme-color" content="#121212" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="F2V" />
  </head>
  <body>
    <templates hidden>
      <template id="err-es">
        <div style="color:#f55;padding:2rem;text-align:center;line-height:1.6">浏览器版本过低，请使用 Chrome 86+ / 现代浏览器</div>
      </template>
      <template id="enc-file-container">
        <div class="enc-file-header">
          <span class="enc-file-summary"></span>
        </div>
        <div class="enc-sort-header">
          <span>#</span><span>文件名</span><span>大小</span><span class="enc-btn-col"></span>
        </div>
        <div class="enc-file-body"></div>
      </template>
      <template id="enc-file-item">
        <div class="file-item" draggable="true">
          <span class="idx"></span><span class="name"></span><span class="size"></span>
          <button class="file-remove">&#x2715;</button>
        </div>
      </template>
      <template id="tasks-empty">
        <div class="tasks-empty">暂无任务</div>
      </template>
      <template id="task-item">
        <div class="task-item">
          <div class="task-header">
            <span class="task-kind"></span>
            <span class="task-status">运行中…</span>
          </div>
          <div class="task-label"></div>
          <div class="task-file"></div>
          <div class="tbar-wrap"><div class="tbar"></div></div>
          <div class="task-pct"></div>
        </div>
      </template>
      <template id="dec-file-container">
        <div class="dec-file-header">
          <label class="select-all-label">
            <input type="checkbox" class="select-all-dec" checked /> 全选
          </label>
          <span class="dec-file-summary"></span>
          <span class="dec-selected-count"></span>
          <button class="btn-batch-dl">&#x1F4E5; 下载选中</button>
        </div>
        <div class="dec-file-body"></div>
      </template>
      <template id="dec-file-item">
        <div class="decode-file-item">
          <input type="checkbox" class="dec-file-cb" checked />
          <span class="name"></span><span class="size"></span>
          <button class="dl-btn">&#x2B07;&#xFE0F;</button>
        </div>
      </template>
    </templates>

    <div class="loading overlay" id="loadingOverlay">
      <style>
        .loading.overlay {
          position:fixed;top:0;left:0;width:100%;height:100%;background:#121212;
          display:flex;flex-direction:column;justify-content:center;align-items:center;
          z-index:2147483647;font-family:system-ui,sans-serif;
        }
        .loading.spin {
          width:48px;height:48px;border:4px solid #2a2a2a;border-top:4px solid #4a4aff;
          border-radius:50%;animation:pray-spin 1s linear infinite;margin-bottom:24px;
        }
        .loading.text { color:#b0b0b0;font-size:15px;text-align:center; }
        @keyframes pray-spin {
          0%{transform:rotate(0deg)}
          100%{transform:rotate(360deg)}
        }
      </style>
      <div class="loading spin"></div>
      <div class="loading text">少女祈祷中...</div>
      <noscript><pre style="color:#f55;margin-top:1rem">需要 JavaScript 支持</pre></noscript>
      <script>
        (function(){
          try{
            if(typeof crypto?.subtle?.encrypt !== 'function') throw 0;
            new Function('async function f(){var a;return a??=1}')();
            if(!Element.prototype.replaceChildren) throw 0;
          }catch(_){
            var err = document.getElementById('err-es').content.cloneNode(true);
            document.getElementById('loadingOverlay').replaceChildren(err);
            throw Error('browser too old');
          }
        })();
        window.deloading = function(){
          delete window.deloading;
          var overlay = document.getElementById('loadingOverlay');
          overlay.ontransitionend = function(){ overlay.remove(); };
          overlay.style.transition = 'opacity 0.721s ease-in';
          var main = document.querySelector('main');
          if(main) main.removeAttribute('hidden');
          void overlay.offsetHeight;
          overlay.style.opacity = '0';
        };
        setTimeout(function(){
          if(typeof window.deloading === 'function') window.deloading();
        }, 1e4);
      </script>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <main hidden>
      <h1>&#x1F4E6; F2V <small>Files to Video</small></h1>
      <div class="sub">AVI 直写直读，文件隐写不压缩。</div>

      <div class="top-bar">
        <div class="mode-tabs">
          <button class="mode-btn active" id="tabEnc">&#x1F512; 编码</button>
          <button class="mode-btn" id="tabDec">&#x1F513; 解码</button>
          <button class="mode-btn" id="tabTasks">&#x1F4CB; 任务</button>
        </div>
        <div class="chunk-select">
          <label>读取分块</label>
          <select id="chunkSize"></select>
          <span id="memHint" class="mem-hint"></span>
        </div>
      </div>

      <!-- 编码 -->
      <div id="encSection" class="section">
        <div class="card">
          <label>&#x1F4C2; 选择文件</label>
          <div class="drop-zone" id="encDrop">
            <input type="file" id="encInput" multiple />
            <div class="icon">&#x1F4C1;</div>
            <div class="text">拖放文件，或点击选择</div>
            <div class="hint">支持任意格式，可追加</div>
          </div>
          <div class="pwd-row">
            <input type="text" id="encPwdInput" class="pwd-input" placeholder="输入密码（可留空）" autocomplete="off" />
          </div>
          <div class="video-params">
            <label class="vp-label">分辨率
              <input type="number" id="encWidth" class="vp-input" value="1920" min="16" max="7680" /> x
              <input type="number" id="encHeight" class="vp-input" value="1080" min="16" max="7680" />
            </label>
            <label class="vp-label">帧率
              <select id="encFps" class="vp-select">
                <option value="1">1</option>
                <option value="10">10</option>
                <option value="24">24</option>
                <option value="30" selected>30</option>
                <option value="60">60</option>
              </select>
            </label>
          </div>
          <div class="btn-group">
            <button class="btn" id="encBtn" disabled>&#x1F3AC; 生成</button>
            <button class="btn-ghost" id="clearBtn">&#x2715; 清空</button>
          </div>
          <div class="info-row" id="encInfo"></div>
          <div class="file-list" id="fileList" style="display:none"></div>
        </div>
      </div>

      <!-- 解码 -->
      <div id="decSection" class="section" style="display:none">
        <div class="card">
          <label>&#x1F4E4; 选择视频</label>
          <div class="drop-zone" id="decDrop">
            <input type="file" id="decInput" accept=".avi" />
            <div class="icon">&#x1F3AC;</div>
            <div class="text" id="decText">拖放 AVI 文件，或点击选择</div>
            <div class="hint" id="decHint">F2V1 格式的 AVI 文件</div>
          </div>
          <div class="pwd-row">
            <input type="text" id="decPwdInput" class="pwd-input" placeholder="输入密码（可留空）" autocomplete="off" />
          </div>
          <div class="btn-group">
            <button class="btn" id="decBtn" disabled>&#x1F50D; 提取</button>
            <button class="btn-ghost" id="decClearBtn">&#x2715; 清空</button>
          </div>
          <div class="file-list" id="decFileList" style="display:none"></div>
        </div>
      </div>

      <!-- 任务 -->
      <div id="tasksSection" class="section" style="display:none">
        <div class="card">
          <h2>&#x1F4CB; 任务列表</h2>
          <div id="tasksList">
            <div style="text-align:center;color:#666;padding:20px">暂无任务</div>
          </div>
        </div>
      </div>

      <div class="footer">
        <span class="sw-status" id="swStatus">
          <span class="sw-dot" id="swDot"></span>
          <span class="sw-name">Service Worker:</span>
          <span class="sw-label" id="swLabel"></span>
        </span>
      </div>
    </main>
  </body>
</html>
